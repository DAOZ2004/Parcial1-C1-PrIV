<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parcial 1</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
    
    <div class="ugb">
        
        <img src="https://seguimiento.ugb.edu.sv/img/logo_login.7199b5d0.png" alt="Logo UGB">


    </div>

    <div class="titulo">
         Parcial Primer Cómputo Ingeniería en Sistemas y Redes Informáticas
    </div>
  </header>

  <main>
    <div class="titulo-central">
      <h2>Sistema de Cotización de Reparación</h2>

    <form id="formCotizacion">

        <input type="text" id="cliente" placeholder="Nombre del cliente">

        <select id="tipoReparacion">
            <option value="">Seleccione tipo de reparación</option>
            <option value="150">Cambio de Pantalla - $150</option>
            <option value="100">Formateo del Sistema - $100</option>
            <option value="200">Cambio de Disco Duro - $200</option>
        </select>

        <select id="urgencia">
            <option value="">Nivel de urgencia</option>
            <option value="1">Normal</option>
            <option value="1.2">Urgente (+20%)</option>
        </select>

        <button type="submit">Calcular Cotización</button>

    </form>

    <div id="resultado"></div>

      
    </div>
  </main>

  <footer>
    <h3>Integrantes del Equipo</h3>
    <p>Daniel Antonio Orellana Zelaya SMSS086223 &nbsp;&nbsp;&nbsp; Andrea Yamileth Rodriguez Hernandez SMSS073124</p>
  </footer>



</body>

</html>
